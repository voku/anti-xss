on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

defaults:
  run:
    shell: bash

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [
            7.3,
            7.4,
            8.0,
            8.1,
            8.2,
            8.3,
            8.4,
        ]
        composer: [basic]
        include:
          - php: 7.3
            composer: lowest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          extensions: zip
          tools: composer

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "directory=$(composer config cache-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: ${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ matrix.php }}-composer-

      - name: Install dependencies
        run: |
          if [[ "${{ matrix.php }}" == "8.3" ]]; then
            composer require phpstan/phpstan --no-update
          fi;

          if [[ "${{ matrix.composer }}" == "lowest" ]]; then
            composer update --prefer-dist --no-interaction --prefer-lowest --prefer-stable
          fi;

          if [[ "${{ matrix.composer }}" == "basic" ]]; then
            composer update --prefer-dist --no-interaction
          fi;

          composer dump-autoload -o

      - name: Run tests
        env:
          XDEBUG_MODE: coverage
        run: |
          mkdir -p build/logs
          if [ "$(php -r 'echo PHP_VERSION_ID;')" -ge 80100 ]; then
            php vendor/bin/phpunit -c phpunit.xml --coverage-clover=build/logs/clover.xml
          else
            php vendor/bin/phpunit -c phpunit9.xml --coverage-clover=build/logs/clover.xml
          fi

      - name: Run phpstan
        if: ${{ matrix.php == '8.3' }}
        run: |
          php vendor/bin/phpstan analyse

      - name: Upload coverage results to Coveralls
        if: ${{ matrix.php == '8.3' && matrix.composer == 'basic' }}
        env:
            COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            composer global require php-coveralls/php-coveralls
            php-coveralls --coverage_clover=build/logs/clover.xml -v

      - name: Upload coverage results to Codecov
        if: ${{ matrix.php == '8.3' && matrix.composer == 'basic' }}
        uses: codecov/codecov-action@v4
        with:
          files: build/logs/clover.xml
      
      - name: Archive logs artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: logs_composer-${{ matrix.composer }}_php-${{ matrix.php }}
          path: |
            build/logs
